server:
  port: 8081
  forward-headers-strategy: framework
spring:
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
  application:
    name: "authentication"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
  endpoint:
    health:
      probes:
        enabled: true
logging:
  level:
    root: INFO
    co.com.bancolombia: DEBUG

cors:
  allowed-origins: http://localhost:4200,http://localhost:8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

adapters:
  r2dbc:
    host: ${DB_HOST}
    port: ${DB_PORT}
    database: ${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    schema: ${DB_SCHEMA}

jwt:
  secret: ${JWT_SECRET}
  expiration: 14400
  issuer: "autenticacion-ms"